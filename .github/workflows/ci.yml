name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: node --check bin/install.js
      - name: Unit tests
        run: npm test
      - name: Dry-run smoke (all clients)
        run: node bin/install.js --print --all
