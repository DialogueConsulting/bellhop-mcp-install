name: publish

# Publishes to npm when a GitHub Release is published.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Trust is configured
# on npmjs.com for @bellhop-marketing/mcp-install against this repo + workflow.
# Requires npm >= 11.5.1 and `id-token: write`; provenance is attached
# automatically.
on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - name: Syntax check
        run: node --check bin/install.js
      - name: Publish
        run: npm publish --access public
